name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      working-directory: packaging
      run: |
        python -m PyInstaller todo_app.spec

    - name: Rename Executable
      working-directory: packaging/dist
      run: |
        mv todo_app.exe JS-To-Do-List-${{ github.ref_name }}-windows-x64.exe

    - name: Generate SHA256 Checksums
      working-directory: packaging/dist
      run: |
        Get-FileHash JS-To-Do-List-${{ github.ref_name }}-windows-x64.exe -Algorithm SHA256 > SHA256SUMS.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          packaging/dist/JS-To-Do-List-${{ github.ref_name }}-windows-x64.exe
          packaging/dist/SHA256SUMS.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
